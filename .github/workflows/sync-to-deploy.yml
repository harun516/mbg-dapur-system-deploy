name: Sync to Deploy Repository

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup git configuration
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "GitHub Actions"

      - name: Debug - Check token exists
        run: |
          if [ -z "${{ secrets.GITHUB_TOKEN }}" ]; then
            echo "❌ ERROR: GITHUB_TOKEN not found!"
            exit 1
          fi
          echo "✅ Token exists"

      - name: Push to deploy repository
        run: |
          git remote add deploy "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/harun516/mbg-dapur-system-deploy.git"
          git push deploy main --force
        env:
          GIT_AUTHOR_NAME: "GitHub Actions"
          GIT_AUTHOR_EMAIL: "github-actions[bot]@users.noreply.github.com"
          GIT_COMMITTER_NAME: "GitHub Actions"
          GIT_COMMITTER_EMAIL: "github-actions[bot]@users.noreply.github.com"

      - name: Verify sync completed
        run: |
          echo "✅ Successfully synced main branch to https://github.com/harun516/mbg-dapur-system-deploy"

